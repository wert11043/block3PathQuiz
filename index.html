<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>血液腫瘤配合題</title>
  <style>
    :root {
      --primary: #2563eb;
      --correct: #16a34a;
      --wrong: #dc2626;
      --selected: #7c3aed;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem 1rem 3rem;
    }
    header {
      text-align: center;
      padding: 1.25rem 0 .75rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
    header p { font-size: .85rem; color: var(--muted); margin-top: .2rem; }

    .categories {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
      margin: .75rem 0 1rem;
    }
    .cat-btn {
      padding: .4rem .9rem;
      border: 2px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      transition: all .15s;
    }
    .cat-btn:hover { border-color: var(--primary); color: var(--primary); }
    .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .status {
      text-align: center;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: .75rem;
    }
    .status b { color: var(--text); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
      max-width: 860px;
      margin: 0 auto;
    }
    .col-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
      margin-bottom: .3rem;
    }
    .col { display: flex; flex-direction: column; gap: .45rem; }

    .tile {
      padding: .65rem .9rem;
      border: 2px solid var(--border);
      border-radius: .6rem;
      background: var(--card);
      cursor: pointer;
      font-size: .82rem;
      line-height: 1.45;
      transition: border-color .12s, background .12s, opacity .12s;
      user-select: none;
      min-height: 2.6rem;
    }
    .tile:hover:not(.matched):not(.flashing) {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .tile.selected {
      border-color: var(--selected);
      background: #f5f3ff;
    }
    .tile.matched {
      border-color: var(--correct);
      background: #f0fdf4;
      color: var(--correct);
      cursor: default;
      opacity: .75;
    }
    .tile.flashing {
      border-color: var(--wrong);
      background: #fef2f2;
      animation: shake .35s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .result {
      display: none;
      text-align: center;
      max-width: 420px;
      margin: 1.5rem auto 0;
      padding: 1.75rem 1.5rem;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
    }
    .result.show { display: block; }
    .result .big { font-size: 3.5rem; font-weight: 900; line-height: 1; }
    .result .big.perfect { color: var(--correct); }
    .result .big.good { color: #d97706; }
    .result .big.bad { color: var(--wrong); }
    .result p { color: var(--muted); margin: .6rem 0 1.25rem; font-size: .9rem; }
    .result button {
      padding: .65rem 1.5rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: .6rem;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 700;
      transition: background .15s;
    }
    .result button:hover { background: #1d4ed8; }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: .5rem;
      margin-bottom: .75rem;
    }
    .tool-btn {
      padding: .4rem 1rem;
      border: 2px solid var(--border);
      border-radius: .5rem;
      background: var(--card);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      transition: all .15s;
    }
    .tool-btn:hover { border-color: var(--primary); color: var(--primary); }
    .tool-btn.answer-btn { border-color: #d97706; color: #d97706; }
    .tool-btn.answer-btn:hover { background: #fffbeb; }

    #answerView {
      display: none;
      max-width: 860px;
      margin: 0 auto;
    }
    #answerView.show { display: block; }
    .answer-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .82rem;
    }
    .answer-table th {
      background: var(--primary);
      color: #fff;
      padding: .5rem .75rem;
      text-align: left;
      font-weight: 700;
      font-size: .75rem;
      letter-spacing: .04em;
    }
    .answer-table th:first-child { border-radius: .5rem 0 0 0; }
    .answer-table th:last-child  { border-radius: 0 .5rem 0 0; }
    .answer-table td {
      padding: .55rem .75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.45;
    }
    .answer-table tr:nth-child(even) td { background: #f8fafc; }
    .answer-table tr:last-child td { border-bottom: none; }
    .answer-table td:last-child {
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .tile { font-size: .79rem; }
      .answer-table td:last-child { white-space: normal; }
    }
  </style>
</head>
<body>
<header>
  <h1>血液腫瘤配合題</h1>
  <p>Hematopathology Matching Quiz — 點選左欄特徵，再點右欄疾病配對</p>
</header>

<div class="categories" id="cats"></div>

<div class="toolbar">
  <button class="tool-btn" id="replayBtn2">重新練習</button>
  <button class="tool-btn answer-btn" id="showAnsBtn">顯示答案</button>
</div>

<div class="status" id="statusBar">
  進度 <b id="prog">0 / 0</b> &nbsp;｜&nbsp; 錯誤 <b id="errs">0</b>
</div>

<div class="grid" id="quizGrid">
  <div>
    <div class="col-label">特徵 / 線索</div>
    <div class="col" id="clueCol"></div>
  </div>
  <div>
    <div class="col-label">疾病名稱</div>
    <div class="col" id="ansCol"></div>
  </div>
</div>

<div class="result" id="result">
  <div class="big" id="bigScore"></div>
  <p id="resultMsg"></p>
  <button id="replayBtn">再試一次</button>
</div>

<div id="answerView">
  <table class="answer-table" id="answerTable">
    <thead><tr><th>特徵 / 線索</th><th>疾病</th></tr></thead>
    <tbody id="answerBody"></tbody>
  </table>
</div>

<script>
const DATA = {
  "流行病學": [
    { c: "小孩最常見血液腫瘤（< 15 歲，CNS + Testis 侵犯）", a: "B-ALL" },
    { c: "青少年（adolescent），anterior mediastinal mass", a: "T-ALL / LBL" },
    { c: "老年（> 60y）+ indolent + 淋巴結 + 血液 + 脾臟（最常見 B-cell leukemia）", a: "CLL / SLL" },
    { c: "老年 + 多發骨骼破壞（CRAB：高鈣、腎衰竭、貧血、骨骼 lytic lesion）", a: "Multiple Myeloma" },
    { c: "成人（median 65y），血液腫瘤，牙齦腫脹 possible", a: "AML" },
    { c: "台灣最多 Peripheral T/NK lymphoma（EBV endemic）", a: "NK/T Lymphoma, nasal" },
    { c: "Southern Japan / West Africa / Caribbean（HTLV-1 endemic）", a: "ATLL" },
    { c: "Endemic = 非洲兒童 jaw（EBV ≈100%）；Sporadic = 腹腔 cecum", a: "Burkitt Lymphoma" },
    { c: "Variable age，成人最常見 Non-Hodgkin lymphoma", a: "DLBCL" },
    { c: "兒童（骨骼 > 皮膚 > 肺），BRAF V600E，CD1a＋", a: "LCH" },
    { c: "老年 + GI tract 高比例侵犯 + Cyclin D1＋（moderately aggressive）", a: "Mantle Cell Lymphoma" },
    { c: "老年 + indolent + Nodular pattern（可轉型為 aggressive）", a: "Follicular Lymphoma" },
    { c: "胃 MALT，H. pylori 高度相關（根除可治癒）", a: "Gastric MALT Lymphoma" },
    { c: "Peripheral T-cell lymphoma 最常見（佔 NHL 5–10%）", a: "PTCL, NOS" },
    { c: "Variable age；Nodular sclerosis 最常見；bimodal age peak", a: "Classical Hodgkin Lymphoma" },
  ],
  "好發位置": [
    { c: "皮膚 epidermis（epidermotropism），patch → plaque → tumor 順序進展", a: "MF / SS" },
    { c: "鼻腔（upper aerodigestive tract），壞死潰爛腫塊，highly aggressive", a: "NK/T Lymphoma, nasal" },
    { c: "Anterior mediastinum（thymic）→ superior vena cava syndrome risk", a: "T-ALL / LBL" },
    { c: "中軸骨（vertebrae、rib、skull、pelvis），多發 lytic lesion", a: "Multiple Myeloma" },
    { c: "Spleen red pulp，毛狀突起 B cells 充滿整個 red pulp", a: "Hairy Cell Leukemia" },
    { c: "胃黏膜（lymphoepithelial lesion），偶見唾腺、眼、肺、甲狀腺", a: "Gastric MALT Lymphoma" },
    { c: "Lymph node，orderly spread：頸部 → 縱隔 → 腋下 → 腹腔", a: "Classical Hodgkin Lymphoma" },
    { c: "Lymph node + GI tract 高比例侵犯（CD5＋ CD23－）", a: "Mantle Cell Lymphoma" },
    { c: "任何器官（排除所有其他 T-cell lymphoma 後才診斷）", a: "PTCL, NOS" },
    { c: "血液 + 骨髓 + CNS（比 AML 更易侵犯）+ Testis", a: "B-ALL" },
    { c: "淋巴結 + 皮膚 + 血液（flower cell），Southern Japan", a: "ATLL" },
    { c: "Lymph node（第二多 peripheral T-cell），多血管，外觀很像良性", a: "AITL" },
    { c: "Endemic → jaw/facial bone；Sporadic → 腹腔 cecum 附近", a: "Burkitt Lymphoma" },
    { c: "Bone（頭顱最常見 lytic）+ 皮膚 + 肺（抽菸）+ 多器官", a: "LCH" },
    { c: "Lymph node（保留 nodular 輪廓），多淋巴結，indolent", a: "Follicular Lymphoma" },
    { c: "Lymph node + 血液 + 脾臟 + 骨髓（全身），indolent", a: "CLL / SLL" },
    { c: "血液 + 骨髓 + 皮膚（leukemia cutis）+ 牙齦腫脹，成人", a: "AML" },
  ],
  "病程": [
    { c: "Indolent + diffuse small cell + pseudofollicle（prolymphocyte 假 GC）", a: "CLL / SLL" },
    { c: "Indolent + Nodular + BCL2＋，可轉型為 aggressive", a: "Follicular Lymphoma" },
    { c: "Indolent，H. pylori 根除後腫瘤可完全緩解（胃）", a: "Gastric MALT Lymphoma" },
    { c: "Moderately aggressive（披羊皮的狼）+ blastoid variant 最惡 + Cyclin D1＋", a: "Mantle Cell Lymphoma" },
    { c: "Aggressive + orderly spread + RS cell + 大量發炎背景，現代治療預後佳", a: "Classical Hodgkin Lymphoma" },
    { c: "Aggressive + diffuse large cell + variable age（成人最常見 NHL）", a: "DLBCL" },
    { c: "Highly aggressive + Starry sky + Ki-67 ≈100% + BCL2－ + MYC", a: "Burkitt Lymphoma" },
    { c: "Highly aggressive + Auer rod + MPO＋ + 成人（median 65y）", a: "AML" },
    { c: "Highly aggressive + TdT＋ + fine chromatin + 兒童，CNS/testis 侵犯", a: "B-ALL" },
    { c: "Highly aggressive + TdT＋ + anterior mediastinal mass + 青少年", a: "T-ALL / LBL" },
    { c: "Highly aggressive + 壞死潰爛 + 血管侵犯 + EBV＋（鼻腔）", a: "NK/T Lymphoma, nasal" },
    { c: "Variable + 多種免疫細胞背景，外觀極像 reactive hyperplasia（great mimicker）", a: "AITL" },
    { c: "Variable（最異質的 T-cell lymphoma），排除法診斷", a: "PTCL, NOS" },
  ],
  "IHC / Marker": [
    { c: "CD5＋ / CD23＋ / CD20＋", a: "CLL / SLL" },
    { c: "CD5＋ / CD23－ / Cyclin D1＋ / CD20＋", a: "Mantle Cell Lymphoma" },
    { c: "CD10＋ / BCL2＋ / CD20＋（Nodular pattern）", a: "Follicular Lymphoma" },
    { c: "CD20＋ / CD10＋ / BCL2－ / Ki-67 ≈100%", a: "Burkitt Lymphoma" },
    { c: "CD20＋（成人最常見 B-cell lymphoma，Diffuse large）", a: "DLBCL" },
    { c: "CD30＋ / CD20－ / PAX5 弱陽性（RS cell，大量發炎背景）", a: "Classical Hodgkin Lymphoma" },
    { c: "CD138＋ / Light chain restriction（κ only 或 λ only）", a: "Multiple Myeloma" },
    { c: "CD3＋ / TdT－（排除法診斷，最常見 peripheral T-cell）", a: "PTCL, NOS" },
    { c: "CD30＋ / ALK＋ / T-cell marker 少（great mimicker）", a: "ALCL（ALK＋）" },
    { c: "CD30＋ / ALK－ / T-cell marker 少（最難與 HL 區分）", a: "ALCL（ALK－）" },
    { c: "CD4＋ / PD1＋ / CD10＋（follicular helper T cell）", a: "AITL" },
    { c: "CD4＋ / HTLV-1＋（關鍵，flower cell）", a: "ATLL" },
    { c: "CD4＋ / HTLV-1－（epidermotropism，cerebriform cell）", a: "MF / SS" },
    { c: "CD3＋ / CD56＋ / EBV＋（三者缺一不確診）", a: "NK/T Lymphoma, nasal" },
    { c: "TdT＋ / CD19＋ / CD10＋（兒童，B lineage）", a: "B-ALL" },
    { c: "TdT＋ / CD3＋（cytoplasmic or surface），青少年縱隔腔", a: "T-ALL / LBL" },
    { c: "MPO＋（lineage marker）/ Auer rod / granules（成人）", a: "AML" },
    { c: "CD1a＋ / Langerin＋（nuclear grooves，Birbeck granules）", a: "LCH" },
    { c: "CD20＋ / BRAF V600E（hairy cells，spleen red pulp）", a: "Hairy Cell Leukemia" },
  ],
  "染色體 / 基因異常": [
    { c: "t(11;14) → Cyclin D1 overexpression（CD5＋ CD23－）", a: "Mantle Cell Lymphoma" },
    { c: "t(14;18) → BCL2 overexpression（Nodular，indolent）", a: "Follicular Lymphoma" },
    { c: "t(8;14) → MYC overexpression（Ki-67 ≈100%，starry sky）", a: "Burkitt Lymphoma" },
    { c: "t(15;17) → PML-RARα（APL/M3，ATRA 治療，DIC 傾向）", a: "AML（M3/APL）" },
    { c: "t(9;22) BCR-ABL1（Philadelphia chromosome，預後差）", a: "B-ALL（Ph＋型）" },
    { c: "t(12;21) ETV6-RUNX1（小兒 B-ALL 最常見，預後好）", a: "B-ALL（ETV6型）" },
    { c: "Hyperdiploidy（> 50 chromosomes，預後好）", a: "B-ALL（Hyperdiploid型）" },
    { c: "ALK translocation（NPM → nucleus + diffuse；TPM3 → diffuse + peripheral）", a: "ALCL（ALK＋）" },
    { c: "BRAF V600E（Birbeck granules，CD1a＋，兒童骨骼）", a: "LCH" },
    { c: "BRAF V600E（B cell neoplasm，脾臟 red pulp，hairy cells）", a: "Hairy Cell Leukemia" },
    { c: "HTLV-1 retrovirus 慢性感染（flower cell，CD4＋）", a: "ATLL" },
    { c: "EBV 感染（存在 B cell 內，TCR rearrangement 確認 clonality）", a: "AITL" },
    { c: "EBV 感染 NK cell（診斷必要條件，無此不診斷）", a: "NK/T Lymphoma, nasal" },
    { c: "H. pylori 相關（根除後腫瘤可消退）", a: "Gastric MALT Lymphoma" },
    { c: "IGH rearrangement + NF-κB activation（B cell origin，但 CD20－）", a: "Classical Hodgkin Lymphoma" },
  ],
  "細胞形態 / 組織學": [
    { c: "Reed-Sternberg cell（owl's eye，雙核，50–100 µm）+ 大量發炎背景", a: "Classical Hodgkin Lymphoma" },
    { c: "Cerebriform cell（核呈腦迴皺褶狀）+ Pautrier microabscess（skin）", a: "MF / SS" },
    { c: "Flower cell / Cloverleaf cell（核多葉化，HTLV-1＋）", a: "ATLL" },
    { c: "Auer rod（azurophilic granule 異常融合結晶，myeloid 特有）", a: "AML" },
    { c: "Starry sky pattern（tingible-body macrophage）+ Ki-67 ≈100%", a: "Burkitt Lymphoma" },
    { c: "Nuclear grooves（咖啡豆核）+ abundant vacuolated cytoplasm", a: "LCH" },
    { c: "Hairy cells（毛狀突起）+ spleen red pulp 充滿 B cells", a: "Hairy Cell Leukemia" },
    { c: "Hallmark cell（超大）+ horseshoe / kidney-shaped nucleus（great mimicker）", a: "ALCL（ALK＋）" },
    { c: "Eccentric nucleus + clock-face / cartwheel chromatin + perinuclear hof", a: "Multiple Myeloma" },
    { c: "Nodular pattern（保留 follicle 輪廓）+ small cleaved centrocyte + BCL2＋", a: "Follicular Lymphoma" },
    { c: "Diffuse small cells + pseudofollicle（prolymphocyte 聚集，假 GC）", a: "CLL / SLL" },
    { c: "Fine chromatin + TdT＋ + high N/C ratio（immature blast，intermediate size）", a: "ALL（B-ALL / T-ALL）" },
    { c: "壞死潰爛腫塊，侵入血管（鼻腔 / upper aerodigestive tract）", a: "NK/T Lymphoma, nasal" },
    { c: "Small irregular cleaved cells（variants：blastoid 最惡，pleomorphic）", a: "Mantle Cell Lymphoma" },
    { c: "Diffuse large cells + variable morphology（最常見 aggressive B-cell）", a: "DLBCL" },
  ],
};

// ─── state ───────────────────────────────────────────────
let pairs = [], matched = 0, errors = 0;
let selClue = null, selAns = null;
let activeCat = "全部混合";

// ─── helpers ─────────────────────────────────────────────
function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

function allPairs() {
  return Object.values(DATA).flat();
}

function startGame(cat) {
  activeCat = cat;
  const pool = cat === "全部混合" ? allPairs() : DATA[cat];
  pairs = shuffle(pool);
  matched = 0; errors = 0;
  selClue = null; selAns = null;
  render();
  updateStatus();
  document.getElementById("result").classList.remove("show");
}

function render() {
  const shuffledClues = shuffle(pairs.map((p, i) => ({ txt: p.c, id: i })));
  const shuffledAns   = shuffle(pairs.map((p, i) => ({ txt: p.a, id: i })));

  const cc = document.getElementById("clueCol");
  const ac = document.getElementById("ansCol");
  cc.innerHTML = ""; ac.innerHTML = "";

  shuffledClues.forEach(({ txt, id }) => {
    cc.appendChild(makeTile(txt, id, "clue"));
  });
  shuffledAns.forEach(({ txt, id }) => {
    ac.appendChild(makeTile(txt, id, "ans"));
  });
}

function makeTile(txt, id, type) {
  const el = document.createElement("div");
  el.className = "tile";
  el.textContent = txt;
  el.dataset.id = id;
  el.dataset.type = type;
  el.addEventListener("click", () => onTile(el));
  return el;
}

function onTile(el) {
  if (el.classList.contains("matched") || el.classList.contains("flashing")) return;
  const type = el.dataset.type;

  if (type === "clue") {
    document.querySelectorAll(".tile[data-type=clue].selected").forEach(e => e.classList.remove("selected"));
    el.classList.add("selected");
    selClue = el;
  } else {
    document.querySelectorAll(".tile[data-type=ans].selected").forEach(e => e.classList.remove("selected"));
    el.classList.add("selected");
    selAns = el;
  }

  if (selClue && selAns) tryMatch();
}

function tryMatch() {
  const clueEl = selClue, ansEl = selAns;
  selClue = null; selAns = null;

  if (clueEl.dataset.id === ansEl.dataset.id) {
    clueEl.classList.remove("selected"); clueEl.classList.add("matched");
    ansEl.classList.remove("selected");  ansEl.classList.add("matched");
    matched++;
    updateStatus();
    if (matched === pairs.length) setTimeout(showResult, 320);
  } else {
    errors++;
    clueEl.classList.remove("selected"); clueEl.classList.add("flashing");
    ansEl.classList.remove("selected");  ansEl.classList.add("flashing");
    setTimeout(() => {
      clueEl.classList.remove("flashing");
      ansEl.classList.remove("flashing");
    }, 400);
    updateStatus();
  }
}

function updateStatus() {
  document.getElementById("prog").textContent = matched + " / " + pairs.length;
  document.getElementById("errs").textContent = errors;
}

function showResult() {
  const total = pairs.length;
  const pct = Math.round(total / (total + errors) * 100);
  const big = document.getElementById("bigScore");
  big.textContent = pct + "%";
  big.className = "big " + (pct === 100 ? "perfect" : pct >= 70 ? "good" : "bad");
  document.getElementById("resultMsg").textContent =
    errors === 0 ? "完美！全部正確，繼續保持！" :
    pct >= 70   ? `答對 ${total} 題，失誤 ${errors} 次，再加強一下！` :
                  `答對 ${total} 題，失誤 ${errors} 次，建議多複習！`;
  document.getElementById("result").classList.add("show");
}

// ─── answer view ─────────────────────────────────────────
function showAnswers() {
  document.getElementById("quizGrid").style.display = "none";
  document.getElementById("statusBar").style.display = "none";
  document.getElementById("result").classList.remove("show");
  const body = document.getElementById("answerBody");
  body.innerHTML = "";
  DATA[activeCat].forEach(p => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${p.c}</td><td>${p.a}</td>`;
    body.appendChild(tr);
  });
  document.getElementById("answerView").classList.add("show");
  document.getElementById("showAnsBtn").textContent = "返回練習";
  document.getElementById("showAnsBtn").onclick = hideAnswers;
}

function hideAnswers() {
  document.getElementById("answerView").classList.remove("show");
  document.getElementById("quizGrid").style.display = "";
  document.getElementById("statusBar").style.display = "";
  document.getElementById("showAnsBtn").textContent = "顯示答案";
  document.getElementById("showAnsBtn").onclick = showAnswers;
}

// ─── category buttons ─────────────────────────────────────
const cats = Object.keys(DATA);
const catsDiv = document.getElementById("cats");
cats.forEach((cat, i) => {
  const btn = document.createElement("button");
  btn.className = "cat-btn" + (i === 0 ? " active" : "");
  btn.textContent = cat;
  btn.addEventListener("click", () => {
    catsDiv.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    hideAnswers();
    startGame(cat);
  });
  catsDiv.appendChild(btn);
});

document.getElementById("replayBtn").addEventListener("click", () => startGame(activeCat));
document.getElementById("replayBtn2").addEventListener("click", () => { hideAnswers(); startGame(activeCat); });
document.getElementById("showAnsBtn").addEventListener("click", showAnswers);

// ─── init ─────────────────────────────────────────────────
startGame(cats[0]);
</script>
</body>
</html>
